  <script>
    const playTabs = document.querySelector(".play-tabs");
    const playButtons = Array.from(document.querySelectorAll("[data-play-view]"));
    const playPanels = Array.from(document.querySelectorAll("[data-play-panel]"));
    const seniorCells = Array.from(document.querySelectorAll(".senior-bingo-cell"));
    const seniorCheckButton = document.getElementById("seniorBingoCheck");
    const seniorShareButton = document.getElementById("seniorBingoShare");
    const seniorResult = document.getElementById("seniorBingoResult");
    const sajuForm = document.getElementById("sajuForm");
    const sajuVideo = document.getElementById("sajuVideo");
    const sajuNameInput = document.getElementById("sajuName");
    const sajuResultTitle = document.getElementById("sajuResultTitle");
    const sajuResultList = document.getElementById("sajuResultList");
    const sajuShareButton = document.getElementById("sajuShareButton");
    const sajuRetryButton = document.getElementById("sajuRetryButton");
    const sajuResultLabels = [
      "당신의 미래 연인",
      "당신의 미래 배우자",
      "당신의 사돈 어른",
      "당신의 인생 라이벌",
      "당신의 인생 귀인",
      "당신의 롤 모델",
      "당신의 반면 교사",
      "당신의 사장",
      "당신의 상사",
      "당신의 부하"
    ];
    const sajuState = {
      name: "타임키퍼",
      results: [],
      timer: null
    };

    playButtons.forEach((button) => {
      button.addEventListener("click", () => setPlayPanel(button.dataset.playView));
    });

    seniorCells.forEach((cell) => {
      cell.setAttribute("aria-pressed", "false");
      cell.addEventListener("click", () => {
        const selected = !cell.classList.contains("is-selected");
        cell.classList.toggle("is-selected", selected);
        cell.setAttribute("aria-pressed", String(selected));
        seniorResult.textContent = "";
        seniorShareButton.hidden = true;
      });
    });

    seniorCheckButton.addEventListener("click", updateSeniorBingoResult);
    seniorShareButton.addEventListener("click", shareSeniorBingoImage);
    sajuForm.addEventListener("submit", startSajuReading);
    sajuVideo.addEventListener("ended", showSajuResult);
    sajuVideo.addEventListener("error", showSajuResult);
    sajuShareButton.addEventListener("click", shareSajuResult);
    sajuRetryButton.addEventListener("click", resetSajuReading);

    function setPlayPanel(view) {
      playTabs.classList.toggle("is-saju", view === "saju");
      playTabs.classList.toggle("is-bingo", view !== "saju");
      playButtons.forEach((button) => {
        const active = button.dataset.playView === view;
        button.classList.toggle("is-active", active);
        if (active) button.setAttribute("aria-current", "true");
        else button.removeAttribute("aria-current");
      });
      playPanels.forEach((panel) => {
        const active = panel.dataset.playPanel === view;
        panel.hidden = !active;
        panel.classList.toggle("is-active", active);
      });
    }

    async function startSajuReading(event) {
      event.preventDefault();
      const fields = Array.from(sajuForm.querySelectorAll("input"));
      if (fields.some((field) => !field.value.trim())) {
        showCopyToast("빈 칸을 채우세요.");
        return;
      }
      sajuState.name = sajuNameInput.value.trim();
      setSajuStep("video");
      sajuVideo.currentTime = 0;
      window.clearTimeout(sajuState.timer);
      sajuState.timer = window.setTimeout(showSajuResult, 4000);
      try {
        await sajuVideo.play();
      } catch (error) {
        window.clearTimeout(sajuState.timer);
        sajuState.timer = window.setTimeout(showSajuResult, 4000);
      }
    }

    async function showSajuResult() {
      window.clearTimeout(sajuState.timer);
      sajuVideo.pause();
      const results = await pickSajuResults();
      sajuState.results = results;
      sajuResultTitle.textContent = `${sajuState.name}의 미래`;
      sajuResultList.innerHTML = results.map((result) => `
        <div class="saju-result-card">
          <span class="saju-result-label">${escapeHtml(result.label)} :</span>
          <img class="saju-partner-image" src="${escapeAttr(result.person.image)}" alt="${escapeAttr(result.person.name)}" />
          <strong class="saju-partner-name">${escapeHtml(result.person.name)}</strong>
        </div>
      `).join("");
      setSajuStep("result");
    }

    function resetSajuReading() {
      window.clearTimeout(sajuState.timer);
      sajuVideo.pause();
      sajuVideo.currentTime = 0;
      setSajuStep("form");
    }

    function setSajuStep(step) {
      document.querySelectorAll("[data-saju-step]").forEach((panel) => {
        const active = panel.dataset.sajuStep === step;
        panel.hidden = !active;
        panel.classList.toggle("is-active", active);
      });
    }

    async function pickSajuResults() {
      const partners = await loadSajuPartners();
      const key = `${await getSajuStableKey()}|${sajuState.name}`;
      return sajuResultLabels.map((label, index) => ({
        label,
        person: partners[hashSajuValue(`${key}|${label}|${index}`) % partners.length]
      }));
    }

    async function loadSajuPartners() {
      try {
        const response = await fetch(`data.json?v=${Date.now()}`, { cache: "no-store" });
        const data = await response.json();
        const unique = new Map();
        (Array.isArray(data.people) ? data.people : []).forEach((person) => {
          const image = String(person.image || "");
          const name = String(person.name || "").trim() || fileNameFromPath(image);
          if (!name || !image.startsWith("profile/")) return;
          unique.set(name, { name, image });
        });
        if (unique.size) return Array.from(unique.values());
      } catch (error) {
        console.warn(error);
      }
      return [
        { name: "갈라보나", image: "profile/갈라보나.png" },
        { name: "버틴", image: "profile/버틴.png" },
        { name: "소네트", image: "profile/소네트.png" }
      ];
    }

    async function getSajuStableKey() {
      try {
        const response = await fetch("/cdn-cgi/trace", { cache: "no-store" });
        const text = await response.text();
        const ip = text.split("\n").find((line) => line.startsWith("ip="))?.slice(3);
        if (ip) return ip;
      } catch (error) {
        console.warn(error);
      }
      return `${navigator.userAgent}|${navigator.language}|${screen.width}x${screen.height}`;
    }

    function hashSajuValue(value) {
      let hash = 2166136261;
      Array.from(value).forEach((char) => {
        hash ^= char.charCodeAt(0);
        hash = Math.imul(hash, 16777619);
      });
      return hash >>> 0;
    }

    function fileNameFromPath(path) {
      return decodeURIComponent(String(path).split("/").pop()?.replace(/\.[^.]+$/, "") || "");
    }

    async function shareSajuResult() {
      if (!sajuState.results.length) return;
      sajuShareButton.disabled = true;
      try {
        const blob = await createSajuResultImage();
        try {
          await copySeniorBingoBlob(blob);
          showCopyToast("이미지 복사 완료");
        } catch (copyError) {
          const shared = await shareSajuImageBlob(blob);
          showCopyToast(shared ? "이미지 공유 준비 완료" : "이미지 다운로드 완료");
        }
      } catch (error) {
        showCopyToast("이미지 공유를 지원하지 않습니다");
      } finally {
        sajuShareButton.disabled = false;
      }
    }

    async function createSajuResultImage() {
      if (document.fonts?.ready) await document.fonts.ready;
      const scale = 2;
      const width = 900;
      const rowHeight = 112;
      const topPadding = 78;
      const bottomPadding = 48;
      const height = topPadding + sajuState.results.length * rowHeight + bottomPadding;
      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#212529";
      ctx.font = '700 36px "SCDream", "Malgun Gothic", sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(sajuResultTitle.textContent, width / 2, 42);
      const labelX = 178;
      const imageX = 368;
      const nameX = 478;

      for (const [index, result] of sajuState.results.entries()) {
        const y = topPadding + index * rowHeight;
        drawSajuResultRowBase(ctx, y, width, rowHeight);
        ctx.fillStyle = "#212529";
        ctx.font = '500 20px "SCDream", "Malgun Gothic", sans-serif';
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText(`${result.label} :`, labelX, y + rowHeight / 2);
        await drawSajuResultImage(ctx, result.person.image, imageX, y + 16, 80, 80);
        ctx.fillStyle = "#061633";
        ctx.font = '700 24px "SCDream", "Malgun Gothic", sans-serif';
        ctx.textAlign = "left";
        ctx.fillText(result.person.name, nameX, y + rowHeight / 2);
      }

      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("이미지를 생성하지 못했습니다."));
        }, "image/png");
      });
    }

    function drawSajuResultRowBase(ctx, y, width, rowHeight) {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(58, y + 8, width - 116, rowHeight - 16);
      ctx.strokeStyle = "#d7dde8";
      ctx.lineWidth = 1;
      ctx.strokeRect(58, y + 8, width - 116, rowHeight - 16);
    }

    async function drawSajuResultImage(ctx, src, x, y, w, h) {
      const image = await loadSajuImage(src).catch(() => null);
      ctx.save();
      roundedRectPath(ctx, x, y, w, h, 10);
      ctx.clip();
      if (image) {
        ctx.drawImage(image, x, y, w, h);
      } else {
        ctx.fillStyle = "#f1f3f5";
        ctx.fillRect(x, y, w, h);
      }
      ctx.restore();
      ctx.strokeStyle = "#d7dde8";
      ctx.lineWidth = 1;
      roundedRectPath(ctx, x, y, w, h, 10);
      ctx.stroke();
    }

    function roundedRectPath(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function loadSajuImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    async function shareSajuImageBlob(blob) {
      const file = new File([blob], "reverse-1999-saju.png", { type: "image/png" });
      if (navigator.canShare?.({ files: [file] }) && navigator.share) {
        await navigator.share({
          files: [file],
          title: sajuResultTitle.textContent,
          text: "리버스 1999 타임키퍼 사주 결과"
        });
        return true;
      }
      downloadSajuResultImage(blob);
      return false;
    }

    function downloadSajuResultImage(blob) {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "reverse-1999-saju.png";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function updateSeniorBingoResult() {
      const selected = seniorCells.map((cell) => cell.classList.contains("is-selected"));
      const bingoLines = countSeniorBingoLines(selected);
      const allSelected = selected.every(Boolean);
      if (allSelected) {
        seniorResult.textContent = "우우... 할배 냄새 싫어";
      } else if (bingoLines >= 10) {
        seniorResult.textContent = "당신이 타임키퍼입니다!";
      } else if (bingoLines >= 8) {
        seniorResult.textContent = "가까운 주변 인물과 함께 하는 시간을 늘리기 권고합니다.";
      } else if (bingoLines >= 6) {
        seniorResult.textContent = "당신은 최고 형상 할배입니다!";
      } else if (bingoLines >= 4) {
        seniorResult.textContent = "당신은 최고 통찰 할배입니다!";
      } else if (bingoLines >= 2) {
        seniorResult.textContent = "축하합니다. 당신은 할배입니다!";
      } else {
        seniorResult.textContent = "당신은 예비 할배입니다!";
      }
      seniorShareButton.hidden = false;
    }

    function countSeniorBingoLines(selected) {
      let lines = 0;
      for (let row = 0; row < 5; row += 1) {
        if ([0, 1, 2, 3, 4].every((col) => selected[row * 5 + col])) lines += 1;
      }
      for (let col = 0; col < 5; col += 1) {
        if ([0, 1, 2, 3, 4].every((row) => selected[row * 5 + col])) lines += 1;
      }
      if ([0, 6, 12, 18, 24].every((index) => selected[index])) lines += 1;
      if ([4, 8, 12, 16, 20].every((index) => selected[index])) lines += 1;
      return lines;
    }

    async function shareSeniorBingoImage() {
      if (!seniorResult.textContent) updateSeniorBingoResult();
      seniorShareButton.disabled = true;
      try {
        const blob = await createSeniorBingoImage();
        await copySeniorBingoBlob(blob);
        showCopyToast("이미지 복사 완료");
      } catch (error) {
        const blob = await createSeniorBingoImage();
        downloadSeniorBingoImage(blob);
        showCopyToast("이미지 다운로드 완료");
      } finally {
        seniorShareButton.disabled = false;
      }
    }

    async function createSeniorBingoImage() {
      if (document.fonts?.ready) await document.fonts.ready;
      const selected = seniorCells.map((cell) => cell.classList.contains("is-selected"));
      const canvas = document.createElement("canvas");
      const scale = 2;
      const width = 1200;
      const titleY = 82;
      const gridSize = 900;
      const gridX = 150;
      const gridY = 120;
      const resultY = gridY + gridSize + 72;
      const height = resultY + 90;
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = "#212529";
      ctx.font = '700 42px "SCDream", "Malgun Gothic", sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("리버스 1999 할배 테스트", width / 2, titleY);
      const cellSize = gridSize / 5;
      seniorCells.forEach((cell, index) => {
        const col = index % 5;
        const row = Math.floor(index / 5);
        const x = gridX + col * cellSize;
        const y = gridY + row * cellSize;
        ctx.fillStyle = "#fff";
        ctx.fillRect(x, y, cellSize, cellSize);
        ctx.strokeStyle = "#d7dde8";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, cellSize, cellSize);
        drawSeniorCellText(ctx, cell.innerText, x + cellSize / 2, y + cellSize / 2, cellSize - 24, cellSize - 28);
        if (selected[index]) {
          ctx.fillStyle = "rgba(0, 0, 0, .42)";
          ctx.fillRect(x, y, cellSize, cellSize);
          drawSeniorCircle(ctx, x + cellSize / 2, y + cellSize / 2, 58);
        }
      });
      ctx.fillStyle = "#061633";
      ctx.font = '700 28px "SCDream", "Malgun Gothic", sans-serif';
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(seniorResult.textContent || "당신은 예비 할배입니다!", width / 2, resultY);
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("이미지를 생성하지 못했습니다."));
        }, "image/png");
      });
    }

    function drawSeniorCellText(ctx, text, x, y, maxWidth, maxHeight) {
      const sourceLines = text.split("\n").map((line) => line.trim()).filter(Boolean);
      let fontSize = 18;
      let lines = [];
      while (fontSize >= 13) {
        ctx.font = `550 ${fontSize}px "SCDream", "Malgun Gothic", sans-serif`;
        lines = sourceLines.flatMap((line) => wrapSeniorCanvasLine(ctx, line, maxWidth));
        const lineHeight = Math.round(fontSize * 1.45);
        if (lines.length * lineHeight <= maxHeight) break;
        fontSize -= 1;
      }
      ctx.fillStyle = "#6f8092";
      ctx.font = `550 ${fontSize}px "SCDream", "Malgun Gothic", sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const lineHeight = Math.round(fontSize * 1.45);
      const startY = y - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, index) => ctx.fillText(line, x, startY + index * lineHeight));
    }

    function wrapSeniorCanvasLine(ctx, line, maxWidth) {
      const wrapped = [];
      let current = "";
      Array.from(line).forEach((char) => {
        const next = current + char;
        if (current && ctx.measureText(next).width > maxWidth) {
          wrapped.push(current);
          current = char.trimStart();
        } else {
          current = next;
        }
      });
      if (current) wrapped.push(current);
      return wrapped;
    }

    function drawSeniorCircle(ctx, x, y, radius) {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.strokeStyle = "#ff6b00";
      ctx.lineWidth = 24;
      ctx.stroke();
    }

    async function copySeniorBingoBlob(blob) {
      if (!navigator.clipboard || !window.ClipboardItem) throw new Error("이미지 클립보드를 지원하지 않습니다.");
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    }

    function downloadSeniorBingoImage(blob) {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "reverse-1999-senior-bingo.png";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function showCopyToast(message) {
      let toast = document.querySelector(".copy-toast");
      if (!toast) {
        toast = document.createElement("div");
        toast.className = "copy-toast";
        toast.setAttribute("role", "status");
        toast.setAttribute("aria-live", "polite");
        document.body.append(toast);
      }
      toast.textContent = message;
      toast.classList.remove("is-visible");
      window.clearTimeout(showCopyToast.timer);
      requestAnimationFrame(() => {
        toast.classList.add("is-visible");
      });
      showCopyToast.timer = window.setTimeout(() => {
        toast.classList.remove("is-visible");
      }, 1600);
    }
  </script>
</body>
</html>
